services:
  api:
    container_name: itoi-api
    image: itoi
    env_file:
      - .env
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    expose:
      - "3000"
    volumes:
      - './:/home/theia/projectos'
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: itoi-db
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
    driver: local
